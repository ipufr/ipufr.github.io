<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汇率计算器</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#764ba2">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="汇率计算器">
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
    background-size: 400% 400%;
    animation: gradientFlow 15s ease infinite;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    padding: 16px;
  }
  @keyframes gradientFlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(80, 60, 180, 0.35);
    padding: 32px 26px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    color: #2d2a4a;
    margin: 0 0 26px;
    letter-spacing: 1px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #7b7898;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .row {
    display: flex;
    gap: 10px;
  }
  input[type="number"] {
    flex: 1 1 auto;
    min-width: 0;
    width: 100%;
    padding: 13px 15px;
    font-size: 19px;
    font-weight: 600;
    color: #2d2a4a;
    border: 1.5px solid #e4e2f0;
    border-radius: 14px;
    outline: none;
    background: #fbfaff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select {
    flex: 0 0 auto;
    width: 150px;
    padding: 13px 10px;
    font-size: 15px;
    color: #2d2a4a;
    border: 1.5px solid #e4e2f0;
    border-radius: 14px;
    outline: none;
    background: #fbfaff;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="number"]:focus, select:focus {
    border-color: #8a7cf5;
    box-shadow: 0 0 0 3px rgba(138, 124, 245, 0.15);
  }
  .field {
    margin-bottom: 16px;
  }
  .swap-wrap {
    display: flex;
    justify-content: center;
    margin: -4px 0 12px;
  }
  #swapBtn {
    border: none;
    background: linear-gradient(135deg, #8a7cf5, #b06ef0);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(138, 124, 245, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #swapBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 16px rgba(138, 124, 245, 0.55);
  }
  #swapBtn:active {
    transform: rotate(180deg) scale(0.95);
  }
  .result {
    text-align: center;
    padding: 22px 16px;
    border-radius: 18px;
    background: linear-gradient(135deg, #8a7cf5, #b06ef0);
    box-shadow: 0 8px 24px rgba(138, 124, 245, 0.35);
  }
  .result .flag-line {
    font-size: 26px;
    margin-bottom: 4px;
  }
  .result .amount {
    font-size: 30px;
    font-weight: 800;
    color: #fff;
    word-break: break-all;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  }
  .result .rate-note {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
  }
  .footer-note {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: #b6b3cc;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    font-size: 12px;
    color: #9793b3;
  }
  .status-row.error {
    color: #e05555;
  }
  #refreshBtn {
    border: none;
    background: #efecff;
    color: #7b6cf0;
    cursor: pointer;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 999px;
    transition: background 0.2s;
  }
  #refreshBtn:hover {
    background: #e2ddff;
  }
  #refreshBtn:disabled {
    color: #bbb;
    background: #f2f2f2;
    cursor: default;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>💱 世界货币汇率计算器</h1>

    <div class="field">
      <label for="amount">金额</label>
      <div class="row">
        <input type="number" id="amount" placeholder="请输入金额" value="100" min="0" step="any">
        <select id="fromCurrency"></select>
      </div>
    </div>

    <div class="swap-wrap">
      <button id="swapBtn" title="交换货币">⇅</button>
    </div>

    <div class="field">
      <label for="toCurrency">目标货币</label>
      <select id="toCurrency" style="width:100%"></select>
    </div>

    <div class="result">
      <div class="flag-line" id="flagLine"></div>
      <div class="amount" id="result">--</div>
      <div class="rate-note" id="rateNote"></div>
    </div>

    <div class="status-row" id="statusRow">
      <span id="statusText">正在获取实时汇率...</span>
      <button id="refreshBtn">刷新</button>
    </div>
    <div class="footer-note">数据来自 open.er-api.com，网络不可用时自动使用离线参考汇率</div>
  </div>

<script>
  // 主流货币列表：代码、中文名、符号、国旗、离线兜底汇率（相对 1 美元）
  const CURRENCIES = [
    { code: 'CNY', name: '人民币', symbol: '¥', flag: '🇨🇳', usdRate: 7.2 },
    { code: 'USD', name: '美元',   symbol: '$', flag: '🇺🇸', usdRate: 1 },
    { code: 'EUR', name: '欧元',   symbol: '€', flag: '🇪🇺', usdRate: 0.92 },
    { code: 'JPY', name: '日元',   symbol: '¥', flag: '🇯🇵', usdRate: 149 },
    { code: 'GBP', name: '英镑',   symbol: '£', flag: '🇬🇧', usdRate: 0.78 },
    { code: 'HKD', name: '港币',   symbol: 'HK$', flag: '🇭🇰', usdRate: 7.8 },
    { code: 'AUD', name: '澳元',   symbol: 'A$', flag: '🇦🇺', usdRate: 1.52 },
    { code: 'CAD', name: '加元',   symbol: 'C$', flag: '🇨🇦', usdRate: 1.36 },
    { code: 'CHF', name: '瑞士法郎', symbol: 'CHF', flag: '🇨🇭', usdRate: 0.88 },
    { code: 'SGD', name: '新加坡元', symbol: 'S$', flag: '🇸🇬', usdRate: 1.34 },
    { code: 'KRW', name: '韩元',   symbol: '₩', flag: '🇰🇷', usdRate: 1330 },
    { code: 'INR', name: '印度卢比', symbol: '₹', flag: '🇮🇳', usdRate: 83.3 },
    { code: 'THB', name: '泰铢',   symbol: '฿', flag: '🇹🇭', usdRate: 35.8 },
    { code: 'MYR', name: '马来西亚林吉特', symbol: 'RM', flag: '🇲🇾', usdRate: 4.7 },
    { code: 'IDR', name: '印尼盾', symbol: 'Rp', flag: '🇮🇩', usdRate: 15600 },
    { code: 'PHP', name: '菲律宾比索', symbol: '₱', flag: '🇵🇭', usdRate: 56.5 },
    { code: 'VND', name: '越南盾', symbol: '₫', flag: '🇻🇳', usdRate: 24500 },
    { code: 'TWD', name: '新台币', symbol: 'NT$', flag: '🇨🇳', usdRate: 31.5 },
    { code: 'RUB', name: '俄罗斯卢布', symbol: '₽', flag: '🇷🇺', usdRate: 92 },
    { code: 'BRL', name: '巴西雷亚尔', symbol: 'R$', flag: '🇧🇷', usdRate: 5 },
    { code: 'MXN', name: '墨西哥比索', symbol: 'MX$', flag: '🇲🇽', usdRate: 17 },
    { code: 'ZAR', name: '南非兰特', symbol: 'R', flag: '🇿🇦', usdRate: 18.8 },
    { code: 'NZD', name: '新西兰元', symbol: 'NZ$', flag: '🇳🇿', usdRate: 1.64 },
    { code: 'SEK', name: '瑞典克朗', symbol: 'kr', flag: '🇸🇪', usdRate: 10.4 },
    { code: 'NOK', name: '挪威克朗', symbol: 'kr', flag: '🇳🇴', usdRate: 10.6 },
    { code: 'DKK', name: '丹麦克朗', symbol: 'kr', flag: '🇩🇰', usdRate: 6.9 },
    { code: 'TRY', name: '土耳其里拉', symbol: '₺', flag: '🇹🇷', usdRate: 32 },
    { code: 'AED', name: '阿联酋迪拉姆', symbol: 'AED', flag: '🇦🇪', usdRate: 3.67 },
    { code: 'SAR', name: '沙特里亚尔', symbol: 'SAR', flag: '🇸🇦', usdRate: 3.75 },
    { code: 'PLN', name: '波兰兹罗提', symbol: 'zł', flag: '🇵🇱', usdRate: 4 }
  ];

  const CURRENCY_MAP = Object.fromEntries(CURRENCIES.map(c => [c.code, c]));

  const amountInput = document.getElementById('amount');
  const fromSelect = document.getElementById('fromCurrency');
  const toSelect = document.getElementById('toCurrency');
  const resultEl = document.getElementById('result');
  const rateNoteEl = document.getElementById('rateNote');
  const flagLineEl = document.getElementById('flagLine');
  const statusRow = document.getElementById('statusRow');
  const statusText = document.getElementById('statusText');
  const refreshBtn = document.getElementById('refreshBtn');
  const swapBtn = document.getElementById('swapBtn');

  // 当前缓存：以 fromSelect 所选货币为基准的汇率表 { code: rate }
  let liveRates = null;
  let liveBase = null;
  let isLive = false;

  function populateSelects() {
    CURRENCIES.forEach(c => {
      const opt1 = document.createElement('option');
      opt1.value = c.code;
      opt1.textContent = `${c.flag} ${c.name} ${c.code}`;
      fromSelect.appendChild(opt1);

      const opt2 = document.createElement('option');
      opt2.value = c.code;
      opt2.textContent = `${c.flag} ${c.name} ${c.code}`;
      toSelect.appendChild(opt2);
    });
    fromSelect.value = 'CNY';
    toSelect.value = 'USD';
  }

  function getRate(fromCode, toCode) {
    if (isLive && liveRates && liveBase === fromCode && liveRates[toCode] != null) {
      return liveRates[toCode];
    }
    // 离线兜底：通过美元换算
    const fromUsd = CURRENCY_MAP[fromCode].usdRate;
    const toUsd = CURRENCY_MAP[toCode].usdRate;
    return toUsd / fromUsd;
  }

  function calculate() {
    const amount = parseFloat(amountInput.value);
    const fromCode = fromSelect.value;
    const toCode = toSelect.value;
    const fromInfo = CURRENCY_MAP[fromCode];
    const toInfo = CURRENCY_MAP[toCode];

    flagLineEl.textContent = `${fromInfo.flag} → ${toInfo.flag}`;

    if (isNaN(amount) || amount < 0) {
      resultEl.textContent = '--';
      rateNoteEl.textContent = '';
      return;
    }

    const rate = getRate(fromCode, toCode);
    const converted = amount * rate;
    resultEl.textContent = toInfo.symbol + ' ' + converted.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
    rateNoteEl.textContent = `${isLive && liveBase === fromCode ? '实时' : '离线参考'}汇率：1 ${fromCode} ≈ ${rate.toFixed(6).replace(/0+$/, '').replace(/\.$/, '')} ${toCode}`;
  }

  async function fetchRates() {
    const base = fromSelect.value;
    refreshBtn.disabled = true;
    statusRow.classList.remove('error');
    statusText.textContent = '正在获取实时汇率...';

    try {
      const resp = await fetch(`https://open.er-api.com/v6/latest/${base}`);
      if (!resp.ok) throw new Error('网络请求失败');
      const data = await resp.json();
      if (!data.rates) throw new Error('返回数据格式异常');

      liveRates = data.rates;
      liveBase = base;
      isLive = true;

      const updateTime = new Date(data.time_last_update_utc || Date.now()).toLocaleString('zh-CN');
      statusText.textContent = `实时汇率 · 更新于 ${updateTime}`;
    } catch (err) {
      isLive = false;
      statusRow.classList.add('error');
      statusText.textContent = '获取实时汇率失败，已使用离线参考汇率';
    } finally {
      refreshBtn.disabled = false;
      calculate();
    }
  }

  amountInput.addEventListener('input', calculate);
  toSelect.addEventListener('change', calculate);
  fromSelect.addEventListener('change', fetchRates);
  refreshBtn.addEventListener('click', fetchRates);
  swapBtn.addEventListener('click', () => {
    const f = fromSelect.value;
    fromSelect.value = toSelect.value;
    toSelect.value = f;
    fetchRates();
  });

  populateSelects();
  calculate();
  fetchRates();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
